name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on tags like v0.1.0, v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update system.json version
        run: |
          jq '.version = "${{ steps.version.outputs.VERSION }}"' system.json > tmp.json
          mv tmp.json system.json

      - name: Create release zip
        run: |
          zip -r paragons-fvtt.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.zip" \
            --exclude "node_modules/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: paragons-fvtt.zip
          body: |
            ## Paragons Foundry VTT System ${{ github.ref_name }}

            **Install via manifest URL:**
            ```
            https://raw.githubusercontent.com/blackbeard718/paragons-fvtt/main/system.json
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
